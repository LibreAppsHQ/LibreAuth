<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="color-scheme" content="light dark" />
		<meta name="referrer" content="no-referrer" />
		<meta name="theme-color" content="#fff4d6" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="LibreAuth" />
		<meta name="application-name" content="LibreAuth" />
		<link rel="manifest" href="/manifest.json" />
		<script>
			(function () {
				try {
					var themes = {
						zine: {
							bg: '#fff4d6',
							panel: '#ffffff',
							accent: '#ffe066',
							alt: '#ff6b6b',
							alt2: '#4ecdc4',
							text: '#0a0a0a',
							border: '#0a0a0a',
							shadow: '#0a0a0a',
							muted: '#4a4a4a',
							onAccent: '#0a0a0a',
							dark: false
						},
						ink: {
							bg: '#f5f5f0',
							panel: '#ffffff',
							accent: '#00e5ff',
							alt: '#ff3366',
							alt2: '#ffe066',
							text: '#0a0a0a',
							border: '#0a0a0a',
							shadow: '#0a0a0a',
							muted: '#555555',
							onAccent: '#0a0a0a',
							dark: false
						},
						voltage: {
							bg: '#141414',
							panel: '#1e1e1e',
							accent: '#ccff00',
							alt: '#ff49db',
							alt2: '#00e5ff',
							text: '#fafafa',
							border: '#fafafa',
							shadow: '#ccff00',
							muted: '#a0a0a0',
							onAccent: '#0a0a0a',
							dark: true
						},
						bubble: {
							bg: '#e8deff',
							panel: '#ffffff',
							accent: '#ff49db',
							alt: '#7b61ff',
							alt2: '#ffe066',
							text: '#0a0a0a',
							border: '#0a0a0a',
							shadow: '#7b61ff',
							muted: '#444444',
							onAccent: '#0a0a0a',
							dark: false
						}
					};
					var k = localStorage.getItem('LibreAuth:theme');
					if (k === 'dark') k = 'voltage';
					if (k === 'light') k = 'ink';
					if (!k || !themes[k]) k = 'zine';
					var p = themes[k];
					var s = document.documentElement.style;
					s.setProperty('--app-background', p.bg);
					s.setProperty('--app-panel', p.panel);
					s.setProperty('--app-elevated', p.panel);
					s.setProperty('--app-card', p.panel);
					s.setProperty('--app-accent', p.accent);
					s.setProperty('--app-accent-alt', p.alt);
					s.setProperty('--app-accent-alt2', p.alt2);
					s.setProperty('--app-on-accent', p.onAccent);
					s.setProperty('--app-text', p.text);
					s.setProperty('--app-muted', p.muted);
					s.setProperty('--app-border', p.border);
					s.setProperty('--app-shadow-color', p.shadow);
					s.setProperty('--app-surface', p.panel);
					s.setProperty('--app-hover', p.dark ? '#2a2a2a' : p.bg);
					s.setProperty('--app-button', p.text);
					document.documentElement.dataset.theme = k;
					var tc = document.querySelector('meta[name="theme-color"]');
					if (tc) tc.setAttribute('content', p.bg);
				} catch (e) {}
				try {
					if (localStorage.getItem('LibreAuth:cookie-consent')) {
						document.documentElement.dataset.cookieConsent = '1';
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
